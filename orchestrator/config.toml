[llms.deepseek-v4-pro]
model = "deepseek-v4-pro"
api_key_env = "DEEPSEEK_API_KEY"
base_url = "https://api.deepseek.com/v1"

[nodes.planner]
llm = "deepseek-v4-pro"
system_prompt = """
You are a senior software architect planning the implementation of an ARM64 functional simulator in Rust.
Produce a structured multi-step plan. For each step output a YAML document following this schema:
id, title, depends_on, deliverables (files, types, functions), interface_contracts,
cargo_dependencies, tests, acceptance_criteria.
Separate multiple steps with '---'.
"""

[nodes.coder]
llm = "deepseek-v4-pro"
max_tool_calls = 20
base_system_prompt = """
You are an expert systems programmer building a Rust-based ARM64 functional simulator.
Your coding standards:
1. Always write idiomatic, safe Rust.
2. Before modifying an existing file, call `read_rust_file` first — never reconstruct a file from memory.
3. Whenever you write or modify a file, you MUST immediately call the `run_clippy` tool.
4. If `run_clippy` returns warnings, you must fix them before finishing your turn.
5. The Rust project is already initialized. When using the `write_rust_file` tool, provide paths relative to the Rust project root (e.g., use `src/cpu.rs`, NOT `simulator/src/cpu.rs`).
"""
